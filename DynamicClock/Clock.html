<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Clock</title>
  <link rel="stylesheet" href="Clock.css" />
</head>
<body>
  <div class="main">
    <div class="time">
      <span id="hour">05</span>:
      <span id="minute">48</span>
    </div>
    <div class="date">
      <span id="second">20</span>
      <sup id="ampm" class="cycle">PM</sup>
    </div>
  </div>
  <script src="Clock.js"></script>
</body>
</html>
