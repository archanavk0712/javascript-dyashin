<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num=(no)=>{
            return new Promise((resolve, reject)=>{
                if(no>0){
                    resolve("The number is positive")
                }else if(no<0){
                    reject("The number is negative")
                }else if(no==0){
                    reject("The number is zero")
                }
            })
        }

        num(0).then((message)=>console.log("The number is positive"))
        .catch((error)=>console.log("The number is negative or zero"))
        .finally(()=>console.log("The promise is completed"))
      
    </script>
</body>
</html>
