<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
    <style>
        #redP,#greenP,#blueP{
            color: black;
            display: none;
        }
    </style>
</head>
<body id="bodyFull">

    <nav class="navbar bg-body-tertiary">
        <span class="navbar-brand mb-0 h">Color Change</span>
    </nav>
    
    <div class="container mt-4 text-center">
        <button class="btn btn-danger me-2" onclick="changeColor('red')">Red</button>
        <button class="btn btn-success me-2" onclick="changeColor('green')">Green</button>
        <button class="btn btn-primary me-2" onclick="changeColor('blue')">Blue</button>
        
        <div id="currentColor" class="mt-3 fw-bold">
            Current Color: Default
        </div>
    </div>
    
    <script>
      function changeColor(color) {
            // Change background
            document.getElementById("bodyFull").style.backgroundColor = color;
            
            // Update label
            document.getElementById("currentColor").innerText = "Current Color: " + color;
            
        }
    </script>
</body>
</html>
